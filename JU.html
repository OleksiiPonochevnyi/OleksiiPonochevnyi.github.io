<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNGLE SURVIVAL</title>
    <style>
        body { background: #051005; color: #aaffaa; font-family: monospace; margin: 0; padding: 5px; }
        .screen { width: 230px; margin: auto; border: 1px solid #446644; background: #000; padding: 5px; }
        .stats { border-bottom: 1px solid #446644; padding: 5px; font-size: 11px; color: #ffff00; }
        .log { height: 60px; font-size: 13px; margin: 10px 0; border: 1px solid #224422; padding: 5px; background: #080808; }
        .btn { display: block; width: 100%; background: #1a331a; color: #fff; border: 1px solid #446644; padding: 10px; margin: 5px 0; text-align: center; font-size: 14px; }
        .btn-fight { background: #8b0000; }
    </style>
</head>
<body>

<div class="screen">
    <div class="stats">
        DIA: <span id="day">1</span> | HP: <span id="hp">100</span><br>
        COMIDA: <span id="food">5</span> | AGUA: <span id="water">5</span>
    </div>

    <div class="log" id="log">¡SOBREVIVE! Busca comida o duerme.</div>

    <div id="controls">
        <!-- Los botones cambian dinamicamente -->
    </div>
    
    <div style="font-size: 10px; color: #668866; margin-top: 5px;" id="inv">Inv: Hacha, Pistola</div>
</div>

<script>
    var hp = 100, food = 5, water = 5, day = 1;
    var inventory = ["Hacha vieja", "Pistola vieja"];
    var weapons = {"Hacha vieja": 15, "Pistola vieja": 25, "Piedra": 5};
    var monsterHP = 0;

    function updateUI(menu) {
        document.getElementById('hp').innerText = hp;
        document.getElementById('food').innerText = food;
        document.getElementById('water').innerText = water;
        document.getElementById('day').innerText = day;
        document.getElementById('inv').innerText = "Inv: " + inventory.join(", ");

        var ctrl = document.getElementById('controls');
        if (hp <= 0 || food <= 0 || water <= 0) {
            document.getElementById('log').innerHTML = "<span style='color:red'>HAS MUERTO</span>";
            ctrl.innerHTML = '<button class="btn" onclick="location.reload()">REINTENTAR</button>';
            return;
        }

        if (menu == "fight") {
            ctrl.innerHTML = '<button class="btn btn-fight" onclick="atacar()">ATACAR CON ' + inventory[0] + '</button>';
        } else {
            ctrl.innerHTML = '<button class="btn" onclick="action(1)">1. DORMIR</button>' +
                             '<button class="btn" onclick="action(2)">2. BUSCAR</button>';
        }
    }

    function action(choice) {
        // Limpiar mensajes anteriores y consumir recursos
        document.getElementById('log').innerHTML = ""; 
        food--; water--; day++;

        if (choice == 1) {
            hp = Math.min(100, hp + 40);
            document.getElementById('log').innerHTML = "Dormiste bien. +40 HP.";
        } else {
            if (Math.random() > 0.4) {
                food += 2; water += 2;
                document.getElementById('log').innerHTML = "Encontrastes bayas y agua.";
            } else {
                inventory.push("Piedra");
                document.getElementById('log').innerHTML = "Solo hallaste una Piedra.";
            }
        }

        // Probabilidad de monstruo
        if (Math.random() <= 0.25) {
            monsterHP = day < 20 ? 50 : 80;
            document.getElementById('log').innerHTML = "<span style='color:red'>¡MONSTRUO APARECE! HP:" + monsterHP + "</span>";
            updateUI("fight");
        } else {
            updateUI("normal");
        }
    }

    function atacar() {
        var dañoJugador = weapons[inventory[0]] || 5;
        var dañoMonstruo = day < 20 ? 15 : 30;

        monsterHP -= dañoJugador;
        hp -= dañoMonstruo;

        // Limpiar y mostrar resultado del turno
        document.getElementById('log').innerHTML = "Golpeas: -" + dañoJugador + ".<br>Te golpean: -" + dañoMonstruo + ".";

        if (monsterHP <= 0) {
            document.getElementById('log').innerHTML = "¡MONSTRUO DERROTADO! +1 comida";
            food++;
            updateUI("normal");
        } else {
            updateUI("fight");
        }
    }

    updateUI("normal");
</script>

</body>
</html>
