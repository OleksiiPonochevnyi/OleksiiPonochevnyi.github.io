<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JUNGLA</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; margin: 0; padding: 5px; }
        .box { width: 220px; margin: auto; border: 1px solid #0f0; padding: 4px; }
        .stats { font-size: 11px; color: #ff0; border-bottom: 1px solid #0f0; margin-bottom: 5px; }
        .log { height: 65px; font-size: 12px; overflow: hidden; background: #050505; padding: 2px; }
        .btn { display: block; width: 100%; background: #111; color: #fff; border: 1px solid #0f0; padding: 8px; margin: 4px 0; font-size: 12px; text-align: center; }
        .btn-atk { background: #400; border-color: #f00; }
    </style>
</head>
<body>

<div class="box">
    <div class="stats">
        D:<span id="d">1</span>|H:<span id="h">100</span>|C:<span id="c">5</span>|A:<span id="a">5</span>
    </div>

    <div class="log" id="log">¡JUNGLA! Sobrevive 100 dias.</div>

    <div id="btns">
        <!-- Botones aqui -->
    </div>
</div>

<script>
    // Variables globales (Compatibles con navegadores viejos)
    var hp = 100, food = 5, water = 5, day = 1;
    var inv = ["old axe", "knife"];
    var dmg = {"old axe": 10, "old gun": 20, "gun": 25, "AK-42": 40, "knife": 12, "rock": 5, "stick": 7};
    var mHP = 0, mAtk = 0;

    function render(mode) {
        document.getElementById('d').innerHTML = day;
        document.getElementById('h').innerHTML = hp;
        document.getElementById('c').innerHTML = food;
        document.getElementById('a').innerHTML = water;

        var area = document.getElementById('btns');
        area.innerHTML = "";

        if (hp <= 0 || food <= 0 || water <= 0) {
            document.getElementById('log').innerHTML = "MUERTO";
            area.innerHTML = '<button class="btn" onclick="location.reload()">REINTENTAR</button>';
            return;
        }

        if (mode == "peleando") {
            for (var i = 0; i < inv.length; i++) {
                var item = inv[i];
                if (dmg[item]) {
                    area.innerHTML += '<button class="btn btn-atk" onclick="atacar(\'' + item + '\')">USAR ' + item + '</button>';
                }
            }
        } else {
            area.innerHTML = '<button class="btn" onclick="turno(1)">1. DORMIR</button>' +
                             '<button class="btn" onclick="turno(2)">2. BUSCAR</button>';
        }
    }

    function turno(op) {
        document.getElementById('log').innerHTML = "";
        food--; water--; day++;

        if (op == 1) {
            hp = 100;
            document.getElementById('log').innerHTML = "Dormiste. HP al 100%.";
        } else {
            if (Math.random() > 0.4) {
                food += 2; water += 2;
                document.getElementById('log').innerHTML = "Hallaste comida/agua.";
            } else {
                var nueva = Math.random() > 0.5 ? "rock" : "stick";
                inv.push(nueva);
                document.getElementById('log').innerHTML = "Hallaste: " + nueva;
            }
        }

        if (Math.random() <= 0.25) {
            mHP = day < 20 ? 50 : (day < 40 ? 75 : 120);
            mAtk = day < 20 ? 10 : (day < 40 ? 20 : 45);
            document.getElementById('log').innerHTML = "¡MONSTRUO! HP:" + mHP;
            render("peleando");
        } else {
            render("normal");
        }
    }

    function atacar(arma) {
        document.getElementById('log').innerHTML = "";
        var dP = dmg[arma];
        mHP -= dP;
        hp -= mAtk;

        document.getElementById('log').innerHTML = "Atacas con " + arma + ". Monstruo te golpea.";

        if (mHP <= 0) {
            document.getElementById('log').innerHTML = "¡VICTORIA! +1 recursos.";
            food++; water++;
            render("normal");
        } else if (hp > 0) {
            document.getElementById('log').innerHTML += " HP Monstruo: " + mHP;
            render("peleando");
        } else {
            render("normal");
        }
    }

    // Iniciar
    render("normal");
</script>

</body>
</html>
