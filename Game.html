<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nokia Road</title>
    <style>
        body { margin: 0; background: #000; color: #00FF00; font-family: monospace; overflow: hidden; text-align: center; }
        canvas { display: block; margin: 5px auto; background: #222; border: 1px solid #444; }
        #ui { font-size: 14px; margin-top: 5px; }
    </style>
</head>
<body>
    <div id="ui">SCORE: <span id="score">0</span></div>
    <canvas id="gameCanvas"></canvas>

<script>
    const canvas = document.getElementById("gameCanvas");
    const ctx = canvas.getContext("2d");
    const scoreEl = document.getElementById("score");

    canvas.width = 150;
    canvas.height = 200;

    let score = 0;
    let gameActive = true;
    let speed = 2.5;
    const laneW = canvas.width / 3;
    
    const player = { lane: 1, w: 25, h: 35, color: '#0077FF' };
    let enemies = [];
    let frameCount = 0;

    function spawnLogic() {
        // Solo intentamos crear enemigos cada 50 frames para dejar espacio
        if (frameCount % 50 === 0) {
            // Decidimos cuántos enemigos habrá (máximo 2 para que siempre pase 1 carril)
            const numEnemies = Math.random() > 0.5 ? 2 : 1;
            
            // Creamos una lista de carriles (0, 1, 2) y los desordenamos
            let lanes = [0, 1, 2].sort(() => Math.random() - 0.5);
            
            // Solo tomamos los primeros (numEnemies), asegurando que al menos 1 carril sobra
            for (let i = 0; i < numEnemies; i++) {
                enemies.push({
                    lane: lanes[i],
                    y: -40,
                    w: 25,
                    h: 35
                });
            }
        }
    }

    function update() {
        if (!gameActive) return;
        frameCount++;

        ctx.fillStyle = "#222";
        ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        // Líneas de carretera
        ctx.strokeStyle = "#444";
        ctx.setLineDash([10, 10]);
        ctx.beginPath();
        ctx.moveTo(laneW, 0); ctx.lineTo(laneW, canvas.height);
        ctx.moveTo(laneW * 2, 0); ctx.lineTo(laneW * 2, canvas.height);
        ctx.stroke();

        // Dibujar Jugador (Coche Azul)
        ctx.fillStyle = player.color;
        const pX = (player.lane * laneW) + (laneW/2 - player.w/2);
        const pY = canvas.height - 50;
        ctx.fillRect(pX, pY, player.w, player.h);

        // Mover y dibujar enemigos
        for (let i = enemies.length - 1; i >= 0; i--) {
            let e = enemies[i];
            e.y += speed;
            
            ctx.fillStyle = "#FF3333";
            const eX = (e.lane * laneW) + (laneW/2 - e.w/2);
            ctx.fillRect(eX, e.y, e.w, e.h);

            // Colisión simple
            if (e.lane === player.lane && e.y + e.h > pY && e.y < pY + player.h) {
                gameActive = false;
                alert("GAME OVER: " + score);
                location.reload();
            }

            // Eliminar y puntuar
            if (e.y > canvas.height) {
                enemies.splice(i, 1);
                score++;
                scoreEl.innerText = score;
                if (score % 10 === 0) speed += 0.3; // Sube velocidad cada 10 puntos
            }
        }

        spawnLogic();
        requestAnimationFrame(update);
    }

    // Controles para Nokia (Números y Flechas)
    window.addEventListener("keydown", (e) => {
        const key = e.key;
        const code = e.keyCode;
        // Izquierda: Tecla 4 o Flecha Izquierda
        if (key === "4" || code === 37 || code === 52) {
            if (player.lane > 0) player.lane--;
        }
        // Derecha: Tecla 6 o Flecha Derecha
        if (key === "6" || code === 39 || code === 54) {
            if (player.lane < 2) player.lane++;
        }
    });

    update();
</script>
</body>
</html>
