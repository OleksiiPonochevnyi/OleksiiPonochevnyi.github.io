<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <!-- RECARGA AUTOMÁTICA CADA 1 SEGUNDO -->
    <meta http-equiv="refresh" content="1">
    <title>Nokia Real Engine</title>
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; }
        #pista { 
            width: 120px; height: 140px; border: 2px solid #fff; 
            margin: 0 auto; position: relative; background: #222;
        }
        .obj { position: absolute; width: 40px; font-weight: bold; }
    </style>
</head>
<body>

    <div id="pista">
        <!-- El obstáculo se posiciona "al azar" cada vez que la página se refresca sola -->
        <div class="obj" style="top: 40px; left: 0px; color: red;">X-X</div>
        
        <!-- Tu coche estático en el centro -->
        <div class="obj" style="bottom: 10px; left: 40px; color: white;">^A^</div>
    </div>

    <p>¡Esquiva usando 4 y 6!</p>
    <div style="display:none;">
        <!-- Aquí iría el código para moverte, pero en este modo 
             solo verás el "movimiento" por el refresco constante -->
    </div>

</body>
</html>
