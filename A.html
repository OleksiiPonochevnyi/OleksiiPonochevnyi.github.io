<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nokia Mini Racer</title>
    <style>
        /* Forzamos que la página no se estire */
        body { 
            background: #000; color: #0f0; font-family: monospace; 
            margin: 0; padding: 0; overflow: hidden; width: 100vw; height: 100vh;
        }
        #ui { font-size: 10px; padding: 2px; background: #111; }
        
        /* Caja del juego tamaño mini para Nokia */
        #game-box { 
            position: relative; 
            width: 120px; /* Tamaño reducido para el ancho del Nokia */
            height: 160px; 
            background: #222; 
            margin: 0 auto; 
            border: 1px solid #444; 
            overflow: hidden;
        }
        .lane { 
            position: absolute; width: 40px; height: 100%; 
            border-right: 1px dashed #333; box-sizing: border-box; 
        }
        #car { 
            position: absolute; bottom: 5px; width: 40px; 
            font-size: 20px; text-align: center; z-index: 10;
        }
        .obs { 
            position: absolute; width: 40px; font-size: 18px; 
            text-align: center; top: -30px; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="ui">PTS:<span id="score">0</span> L:<span id="lvl">1</span></div>
    
    <div id="game-box">
        <div class="lane" style="left:0"></div>
        <div class="lane" style="left:40px"></div>
        <div class="lane" style="left:80px"></div>
        
        <div id="car" style="left:40px">🏎️</div>
        <div id="obs1" class="obs" style="left:0px">🚔</div>
        <div id="obs2" class="obs" style="left:80px">🚧</div>
    </div>

    <script>
        var car = document.getElementById('car');
        var o1 = document.getElementById('obs1');
        var o2 = document.getElementById('obs2');
        var lane = 1;
        var score = 0;
        var speed = 6;
        var vivo = true;

        var obs = [
            { el: o1, y: -40, l: 0 },
            { el: o2, y: -120, l: 2 }
        ];

        window.onkeydown = function(e) {
            if (!vivo) return;
            var k = e.keyCode;
            // 52 = Tecla 4, 54 = Tecla 6
            if (k == 52 || k == 37) { if(lane > 0) lane--; }
            if (k == 54 || k == 39) { if(lane < 2) lane++; }
            car.style.left = (lane * 40) + "px";
        };

        function loop() {
            if (!vivo) return;

            for (var i = 0; i < obs.length; i++) {
                var o = obs[i];
                o.y += speed;

                if (o.y > 160) {
                    o.y = -50;
                    var nuevaL = Math.floor(Math.random() * 3);
                    if (i == 1 && nuevaL == obs[0].l) nuevaL = (nuevaL + 1) % 3;
                    o.l = nuevaL;
                    o.el.style.left = (o.l * 40) + "px";
                    score++;
                    document.getElementById('score').innerHTML = score;
                    if(score % 5 == 0) speed += 0.5;
                }
                o.el.style.top = o.y + "px";

                if (o.y > 115 && o.y < 150 && lane == o.l) {
                    vivo = false;
                    car.innerHTML = "💥";
                    alert("FIN! Puntos: " + score);
                    location.reload();
                }
            }
            setTimeout(loop, 50);
        }
        loop();
    </script>
</body>
</html>
