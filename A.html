<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    /* Forzamos al navegador a no hacer zoom */
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, target-densitydpi=device-dpi">
    <title>Nokia Racer ASCII</title>
    <style>
        * { touch-action: manipulation; }
        body { 
            background: #000; color: #0f0; font-family: monospace; 
            margin: 0; padding: 0; overflow: hidden;
            width: 100%; height: 100%; position: fixed; /* Evita el scroll y zoom */
        }
        #ui { font-size: 12px; background: #111; text-align: center; height: 20px; }
        
        #game-box { 
            position: relative; 
            width: 120px; 
            height: 160px; 
            background: #000; 
            margin: 0 auto; 
            border: 2px solid #0f0; 
            overflow: hidden;
        }
        .lane { 
            position: absolute; width: 40px; height: 100%; 
            border-right: 1px dashed #222; box-sizing: border-box; 
        }
        /* Coche con letras */
        #car { 
            position: absolute; bottom: 10px; width: 40px; 
            font-weight: bold; font-size: 18px; text-align: center; z-index: 10;
        }
        /* Obstáculo con letras */
        .obs { 
            position: absolute; width: 40px; font-size: 16px; 
            font-weight: bold; text-align: center; top: -30px; z-index: 5;
        }
    </style>
</head>
<body>

    <div id="ui">PTS:<span id="score">0</span></div>
    
    <div id="game-box">
        <div class="lane" style="left:0"></div>
        <div class="lane" style="left:40px"></div>
        <div class="lane" style="left:80px"></div>
        
        <div id="car" style="left:40px">^A^</div>
        <div id="obs1" class="obs" style="left:0px">X-X</div>
        <div id="obs2" class="obs" style="left:80px">X-X</div>
    </div>

    <script>
        var car = document.getElementById('car');
        var o1 = document.getElementById('obs1');
        var o2 = document.getElementById('obs2');
        var lane = 1;
        var score = 0;
        var speed = 6;
        var vivo = true;

        var obs = [
            { el: o1, y: -40, l: 0 },
            { el: o2, y: -120, l: 2 }
        ];

        // Mapeo de teclas 4 y 6
        window.onkeydown = function(e) {
            if (!vivo) return;
            var k = e.keyCode;
            if (k == 52 || k == 37) { if(lane > 0) lane--; }
            if (k == 54 || k == 39) { if(lane < 2) lane++; }
            car.style.left = (lane * 40) + "px";
            // Prevenir que la tecla mueva la pantalla
            e.preventDefault();
        };

        function loop() {
            if (!vivo) return;

            for (var i = 0; i < obs.length; i++) {
                var o = obs[i];
                o.y += speed;

                if (o.y > 160) {
                    o.y = -50;
                    var nuevaL = Math.floor(Math.random() * 3);
                    if (i == 1 && nuevaL == obs[0].l) nuevaL = (nuevaL + 1) % 3;
                    o.l = nuevaL;
                    o.el.style.left = (o.l * 40) + "px";
                    score++;
                    document.getElementById('score').innerHTML = score;
                    if(score % 5 == 0) speed += 0.5;
                }
                o.el.style.top = o.y + "px";

                if (o.y > 110 && o.y < 145 && lane == o.l) {
                    vivo = false;
                    car.innerHTML = "*#*";
                    alert("GAME OVER! Ptos: " + score);
                    location.reload();
                }
            }
            setTimeout(loop, 50);
        }
        loop();
    </script>
</body>
</html>
