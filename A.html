<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #000; color: #0f0; font-family: monospace; text-align: center; margin: 0; }
        #game { 
            position: relative; width: 120px; height: 120px; 
            border: 2px solid #0f0; margin: 10px auto; overflow: hidden; background: #111;
        }
        .car { position: absolute; width: 40px; font-weight: bold; }
        #player { bottom: 5px; color: #fff; }
        #obs { top: 0px; color: #f00; }
        .btn { padding: 10px; background: #333; color: #fff; border: 1px solid #555; }
    </style>
</head>
<body>

    <div style="font-size:12px;">PUNTOS: <span id="s">0</span></div>
    
    <div id="game">
        <div id="obs" class="car" style="left:0px; top:0px;">X-X</div>
        <div id="player" class="car" style="left:40px;">^A^</div>
    </div>

    <div style="margin-top:10px;">
        <button class="btn" onclick="m(0)">4</button>
        <button class="btn" onclick="m(1)">5</button>
        <button class="btn" onclick="m(2)">6</button>
    </div>

    <script>
        var p = document.getElementById('player');
        var o = document.getElementById('obs');
        var px = 1; var ox = 0; var oy = 0; var sc = 0;

        function m(n) {
            // Mover jugador
            px = n;
            p.style.left = (px * 40) + "px";

            // El obstáculo baja SOLO cuando tú te mueves (paso a paso)
            oy += 20; 
            if(oy > 100) {
                oy = 0;
                ox = Math.floor(Math.random() * 3);
                o.style.left = (ox * 40) + "px";
                sc++;
                document.getElementById('s').innerHTML = sc;
            }
            o.style.top = oy + "px";

            // Colisión
            if(oy >= 80 && px == ox) {
                alert("CHOQUE! Puntos: " + sc);
                location.reload();
            }
        }

        // Mapeo de teclado físico
        window.onkeydown = function(e) {
            if(e.keyCode == 52) m(0); // Tecla 4
            if(e.keyCode == 53) m(1); // Tecla 5
            if(e.keyCode == 54) m(2); // Tecla 6
        };
    </script>
</body>
</html>
